services:
  # Base de Datos
  db:
    image: postgres:16
    container_name: odoo18_db
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - odoo-db-data:/var/lib/postgresql/data
    networks:
      - odoo-network

  # Odoo 18
  web:
    image: odoo:18.0
    container_name: odoo18_web
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    # Forzamos a que use el archivo de configuración que creamos
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]
    networks:
      - odoo-network

  # pgAdmin para gestionar la DB de forma visual
  pgadmin:
    image: dpage/pgadmin4
    container_name: odoo18_pgadmin
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    networks:
      - odoo-network

networks:
  odoo-network:
    driver: bridge

volumes:
  odoo-db-data:
  odoo-web-data: